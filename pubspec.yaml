name: workshop_manager
description: تطبيق إدارة ورشة تنجيد وأثاث - عملاء، طلبات، مديونيات، مصروفات، وأجور الصنايعية
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: 3.44.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_database: ^11.1.0
  firebase_storage: ^12.1.1

  # Offline-first local cache
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.1.0
  connectivity_plus: ^6.0.5

  # تسجيل الدخول المحلي (يوزر/باسورد بسيطين، بدون Firebase Auth)
  shared_preferences: ^2.3.2

  # UI / Fonts / RTL Arabic support
  google_fonts: ^6.2.1
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Charts for Dashboard analytics
  fl_chart: ^0.68.0

  # PDF / Excel export
  pdf: ^3.11.0
  printing: ^5.13.2
  excel: ^4.0.6
  share_plus: ^10.0.2
  cross_file: ^0.3.4+2

  # Utilities
  path_provider: ^2.1.4
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  hive_ce_generator: ^1.6.1

flutter:
  uses-material-design: true
